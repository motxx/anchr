app = "anchr-tlsn-verifier"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  SOCKS_PROXY = "socks5://127.0.0.1:9050"

# WS port exposed via fly.io HTTP (TLS terminated by fly.io)
[http_service]
  internal_port = 7047
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
