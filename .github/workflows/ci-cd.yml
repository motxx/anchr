name: CI/CD

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests (no Docker needed)
        run: |
          find src/ mobile/src/ -name '*.test.ts' \
            ! -name '*.integration.test.ts' \
            ! -path '*/e2e/*' \
            | xargs bun test

      - name: Start infrastructure (relay + Blossom)
        run: docker compose up -d relay blossom && sleep 5

      - name: Integration & E2E tests (with Docker)
        run: bun test src/worker-api.integration.test.ts src/mcp-server.integration.test.ts e2e/relay.test.ts
        env:
          NOSTR_RELAYS: ws://localhost:7777
          BLOSSOM_SERVERS: http://localhost:3333

      - name: Stop infrastructure
        if: always()
        run: docker compose down

      - name: Build deploy image
        run: docker build -t anchr:${{ github.sha }} .

  deploy-infra:
    name: Deploy ${{ matrix.app }}
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' &&
         github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
      }}
    concurrency:
      group: fly-${{ matrix.app }}
      cancel-in-progress: true
    permissions:
      contents: read
    environment:
      name: production

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: relay
            config: fly.relay.toml
            token_secret: FLY_API_TOKEN_RELAY
          - app: blossom
            config: fly.blossom.toml
            token_secret: FLY_API_TOKEN_BLOSSOM

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy ${{ matrix.app }}
        run: flyctl deploy --remote-only --config ${{ matrix.config }}
        env:
          FLY_API_TOKEN: ${{ secrets[matrix.token_secret] }}

  deploy-app:
    name: Deploy Anchr App
    needs: deploy-infra
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' &&
         github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
      }}
    concurrency:
      group: fly-app
      cancel-in-progress: true
    permissions:
      contents: read
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_APP }}
