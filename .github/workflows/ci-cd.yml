name: CI/CD

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests (no Docker needed)
        run: |
          find src/ packages/sdk/src/ mobile/src/ -name '*.test.ts' \
            ! -name '*.integration.test.ts' \
            ! -path '*/e2e/*' \
            | xargs bun test

      - name: Start infrastructure (relay + Blossom + regtest Lightning)
        if: ${{ !cancelled() }}
        run: docker compose up -d relay blossom bitcoind lnd-mint lnd-user && sleep 5

      - name: Integration & E2E tests (relay + Blossom)
        if: ${{ !cancelled() }}
        run: bun test src/worker-api.integration.test.ts src/mcp-server.integration.test.ts e2e/relay.test.ts
        env:
          NOSTR_RELAYS: ws://localhost:7777
          BLOSSOM_SERVERS: http://localhost:3333

      - name: Initialize regtest (wait for LND + fund + open channel)
        if: ${{ !cancelled() }}
        run: ./scripts/init-regtest.sh

      - name: Start Cashu mint
        if: ${{ !cancelled() }}
        run: |
          docker compose up -d cashu-mint
          echo "Waiting for Cashu mint to be ready (up to 30s)..."
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3338/v1/info > /dev/null 2>&1; then
              echo "Cashu mint is ready."
              break
            fi
            echo "  Waiting... ($i/10)"
            sleep 3
          done

      - name: Regtest E2E tests (HTLC + Cashu)
        if: ${{ !cancelled() }}
        run: bun test e2e/regtest-htlc-trustless.test.ts e2e/regtest-cashu.test.ts
        env:
          CASHU_MINT_URL: http://localhost:3338
          NOSTR_RELAYS: ws://localhost:7777
          BLOSSOM_SERVERS: http://localhost:3333

      - name: Stop infrastructure
        if: always()
        run: docker compose down

      - name: Build deploy image
        run: docker build -t anchr:${{ github.sha }} .

  deploy-infra:
    name: Deploy ${{ matrix.app }}
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' &&
         github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
      }}
    concurrency:
      group: fly-${{ matrix.app }}
      cancel-in-progress: true
    permissions:
      contents: read
    environment:
      name: production

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: relay
            config: fly.relay.toml
            workdir: "."
            token_secret: FLY_API_TOKEN_RELAY
          - app: blossom
            config: fly.blossom.toml
            workdir: "."
            token_secret: FLY_API_TOKEN_BLOSSOM
          - app: tlsn-verifier
            config: fly.toml
            workdir: crates/tlsn-server
            token_secret: FLY_API_TOKEN_VERIFIER

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2 # master

      - name: Deploy ${{ matrix.app }}
        working-directory: ${{ matrix.workdir }}
        run: flyctl deploy --remote-only --config ${{ matrix.config }}
        env:
          FLY_API_TOKEN: ${{ secrets[matrix.token_secret] }}

  deploy-app:
    name: Deploy Anchr App
    needs: deploy-infra
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' &&
         github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
      }}
    concurrency:
      group: fly-app
      cancel-in-progress: true
    permissions:
      contents: read
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2 # master

      - name: Deploy
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_APP }}

  deploy-worker:
    name: Deploy Auto-Worker
    needs: deploy-app
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' &&
         github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
      }}
    concurrency:
      group: fly-worker
      cancel-in-progress: true
    permissions:
      contents: read
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2 # master

      - name: Deploy
        run: flyctl deploy --remote-only --config fly.worker.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_WORKER }}
