version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # npm (deno.lock / package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker"

  - package-ecosystem: "docker"
    directory: "/crates/tlsn-server"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker"

  # Cargo (Rust crates)
  - package-ecosystem: "cargo"
    directory: "/crates/tlsn-server"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "cargo"
    directory: "/crates/tlsn-verifier"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "cargo"
    directory: "/crates/tlsn-prover"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
