<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Anchr — Payment Proof</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080d;
    color: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 32px 32px 8px;
    text-align: center;
    position: relative;
  }
  header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  .tagline {
    font-size: 14px;
    color: #555;
    margin-top: 6px;
  }
  #timer {
    position: absolute;
    top: 32px;
    right: 32px;
    font-size: 15px;
    color: #444;
    font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', Menlo, monospace;
  }

  #flow {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 0;
    padding: 0 32px;
  }

  .connector {
    width: 2px;
    height: 20px;
    background: #1a1a25;
    transition: background 0.5s;
  }
  .connector.lit { background: #22c55e40; }

  .card {
    width: 100%;
    max-width: 420px;
    background: #0e0e16;
    border: 1px solid #1a1a25;
    border-radius: 14px;
    padding: 20px 24px;
    opacity: 0.25;
    transform: scale(0.97);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .card.active {
    opacity: 1;
    transform: scale(1);
    border-color: #3b82f6;
    box-shadow: 0 0 30px rgba(59, 130, 246, 0.08);
  }

  .card.done {
    opacity: 0.65;
    transform: scale(1);
    border-color: #22c55e30;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    background: #13131d;
    flex-shrink: 0;
    transition: all 0.4s;
  }
  .card.active .card-icon {
    background: #172554;
  }
  .card.done .card-icon {
    background: #14532d;
    font-size: 16px;
  }

  .card-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .card-time {
    margin-left: auto;
    font-size: 13px;
    color: #22c55e;
    font-family: 'SF Mono', Menlo, monospace;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .card.done .card-time { opacity: 1; }

  .card-desc {
    font-size: 13px;
    color: #555;
    margin-top: 8px;
    margin-left: 54px;
    line-height: 1.5;
    transition: color 0.4s;
  }
  .card.active .card-desc { color: #93c5fd; }
  .card.done .card-desc { color: #6b7280; }

  /* Result card */
  .card.result {
    opacity: 1;
    transform: scale(1);
    background: #0a1a0a;
    border-color: #22c55e;
    box-shadow: 0 0 40px rgba(34, 197, 94, 0.08);
    max-width: 420px;
  }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #153015;
    font-size: 13px;
  }
  .result-row:last-child { border-bottom: none; }
  .result-key { color: #6b7280; }
  .result-value {
    color: #4ade80;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 12px;
    text-align: right;
    max-width: 60%;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .result-footer {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid #153015;
    font-size: 13px;
    color: #4ade8099;
    text-align: center;
    letter-spacing: -0.01em;
  }

  /* Pulse animation for active card */
  .card.active .card-icon {
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.3); }
    50% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
  }
</style>
</head>
<body>
  <header>
    <h1>Anchr</h1>
    <div class="tagline">Prove any payment. Trust no one.</div>
    <div id="timer"></div>
  </header>

  <div id="flow">
    <div class="card" id="card-0">
      <div class="card-header">
        <div class="card-icon">💳</div>
        <div class="card-title">Pay</div>
        <div class="card-time" id="time-0"></div>
      </div>
      <div class="card-desc" id="desc-0">Buyer pays via Square</div>
    </div>

    <div class="connector" id="conn-1"></div>

    <div class="card" id="card-1">
      <div class="card-header">
        <div class="card-icon">🔐</div>
        <div class="card-title">Prove</div>
        <div class="card-time" id="time-1"></div>
      </div>
      <div class="card-desc" id="desc-1">Generate cryptographic proof via TLSNotary</div>
    </div>

    <div class="connector" id="conn-2"></div>

    <div class="card" id="card-2">
      <div class="card-header">
        <div class="card-icon">⚓</div>
        <div class="card-title">Verify</div>
        <div class="card-time" id="time-2"></div>
      </div>
      <div class="card-desc" id="desc-2">Anchr verifies the proof</div>
    </div>

    <div class="connector" id="conn-3" style="display:none"></div>

    <div class="card" id="card-3" style="display:none">
      <div class="card-header">
        <div class="card-icon">✅</div>
        <div class="card-title">Result</div>
      </div>
      <div id="result-body" style="margin-top:12px"></div>
    </div>
  </div>

<script>
let startTime = Date.now();
const stepStarts = {};

setInterval(() => {
  document.getElementById('timer').textContent =
    ((Date.now() - startTime) / 1000).toFixed(1) + 's';
}, 100);

window.flowSetStart = (ts) => { startTime = ts; };

window.flowActivate = (step, desc) => {
  stepStarts[step] = Date.now();
  const card = document.getElementById('card-' + step);
  card.classList.add('active');
  if (desc) document.getElementById('desc-' + step).textContent = desc;
};

window.flowComplete = (step, desc) => {
  const card = document.getElementById('card-' + step);
  card.classList.remove('active');
  card.classList.add('done');
  card.querySelector('.card-icon').textContent = '✓';
  if (desc) document.getElementById('desc-' + step).textContent = desc;
  if (stepStarts[step]) {
    document.getElementById('time-' + step).textContent =
      ((Date.now() - stepStarts[step]) / 1000).toFixed(1) + 's';
  }
  const conn = document.getElementById('conn-' + (step + 1));
  if (conn) conn.classList.add('lit');
};

window.flowResult = (data) => {
  document.getElementById('conn-3').style.display = '';
  document.getElementById('conn-3').classList.add('lit');
  const card = document.getElementById('card-3');
  card.style.display = '';
  card.classList.add('result');

  const body = document.getElementById('result-body');
  body.innerHTML = '';

  for (const [key, value] of Object.entries(data.fields)) {
    const row = document.createElement('div');
    row.className = 'result-row';
    row.innerHTML =
      '<span class="result-key">' + key + '</span>' +
      '<span class="result-value">' + value + '</span>';
    body.appendChild(row);
  }

  if (data.footer) {
    const footer = document.createElement('div');
    footer.className = 'result-footer';
    footer.textContent = data.footer;
    body.appendChild(footer);
  }

  const total = ((Date.now() - startTime) / 1000).toFixed(1);
  document.getElementById('timer').textContent = '✓ ' + total + 's';
  document.getElementById('timer').style.color = '#22c55e';
};
</script>
</body>
</html>
