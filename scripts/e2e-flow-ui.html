<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Anchr E2E Flow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: hsl(240, 10%, 3.9%);
    color: hsl(0, 0%, 98%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid hsl(240, 3.7%, 15.9%);
  }
  header h1 { font-size: 16px; font-weight: 600; }
  #timer { font-size: 14px; color: hsl(240, 5%, 64.9%); font-variant-numeric: tabular-nums; }

  #progress-bar {
    height: 3px;
    background: hsl(240, 3.7%, 15.9%);
  }
  #progress-fill {
    height: 100%;
    background: oklch(70.7% .165 254.624);
    transition: width 0.5s ease;
    width: 0%;
  }

  #pipeline {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 8px 16px;
    gap: 0;
    overflow-y: auto;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 8px;
    flex-shrink: 0;
  }
  .step-icon {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: hsl(240, 10%, 10%);
    border: 2px solid hsl(240, 3.7%, 20%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.3s ease;
    flex-shrink: 0;
  }
  .step-text {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .step-label {
    font-size: 12px;
    font-weight: 600;
    color: hsl(240, 5%, 50%);
    transition: color 0.3s;
  }
  .step-detail {
    font-size: 10px;
    color: hsl(240, 5%, 40%);
    transition: color 0.3s;
  }
  .step-time {
    margin-left: auto;
    font-size: 11px;
    color: oklch(76.5% .177 163.223);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }

  /* Edge between steps */
  .edge {
    width: 2px;
    height: 8px;
    background: hsl(240, 3.7%, 15.9%);
    position: relative;
    flex-shrink: 0;
    margin-left: 22px;
  }
  .edge-dot {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: oklch(70.7% .165 254.624);
    left: -2px;
    top: 0;
    opacity: 0;
  }

  /* States */
  .step.active .step-icon {
    border-color: oklch(70.7% .165 254.624);
    background: hsl(240, 30%, 15%);
    animation: pulse 2s infinite;
  }
  .step.active .step-label { color: hsl(0, 0%, 98%); }
  .step.active .step-detail { color: oklch(70.7% .165 254.624); }

  .step.complete .step-icon {
    border-color: oklch(76.5% .177 163.223);
    background: hsl(160, 30%, 12%);
  }
  .step.complete .step-label { color: hsl(0, 0%, 80%); }
  .step.complete .step-detail { color: hsl(240, 5%, 55%); }

  .step.error .step-icon {
    border-color: oklch(63.7% .237 25.331);
    background: hsl(0, 30%, 12%);
  }

  .edge.active {
    background: oklch(70.7% .165 254.624);
  }
  .edge.active .edge-dot {
    animation: flow-dot 0.6s ease-in-out infinite;
  }
  .edge.complete {
    background: oklch(76.5% .177 163.223);
  }

  /* Log */
  #log {
    height: 80px;
    overflow-y: auto;
    padding: 6px 24px;
    font-size: 11px;
    font-family: 'SF Mono', 'Menlo', monospace;
    color: hsl(240, 5%, 50%);
    border-top: 1px solid hsl(240, 3.7%, 15.9%);
  }
  #log div { padding: 1px 0; }
  #log .log-active { color: oklch(70.7% .165 254.624); }
  #log .log-complete { color: oklch(76.5% .177 163.223); }
  #log .log-error { color: oklch(63.7% .237 25.331); }

  /* Banner */
  #banner {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: hsl(160, 30%, 12%);
    border: 1px solid oklch(76.5% .177 163.223);
    border-radius: 12px;
    padding: 16px 32px;
    text-align: center;
    z-index: 10;
    animation: fade-in 0.5s ease;
  }
  #banner h2 { font-size: 18px; color: oklch(76.5% .177 163.223); }
  #banner p { font-size: 13px; color: hsl(240, 5%, 64.9%); margin-top: 4px; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(96, 165, 250, 0.4); }
    50% { box-shadow: 0 0 0 8px rgba(96, 165, 250, 0); }
  }
  @keyframes flow-dot {
    0% { top: 0%; opacity: 0; }
    15% { opacity: 1; }
    85% { opacity: 1; }
    100% { top: calc(100% - 6px); opacity: 0; }
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
</style>
</head>
<body>
  <header>
    <h1>Anchr — Fiat Swap E2E Flow</h1>
    <div id="timer">0.0s</div>
  </header>
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <div id="pipeline"></div>

  <div id="log"></div>
  <div id="banner"><h2></h2><p></p></div>

<script>
const STEPS = [
  { icon: '👤', label: 'Requester', action: 'Create Query' },
  { icon: '🪙', label: 'Cashu Mint', action: 'Mint Bounty' },
  { icon: '⚓', label: 'Anchr', action: 'Escrow Token' },
  { icon: '🟦', label: 'Square', action: 'Payment Link' },
  { icon: '💳', label: 'Buyer', action: 'Pay via Browser' },
  { icon: '🔐', label: 'TLSNotary', action: 'MPC-TLS Proof' },
  { icon: '⚓', label: 'Anchr', action: 'Verify Proof' },
  { icon: '✅', label: 'Worker', action: 'Receive Bounty' },
];

const state = { startTime: Date.now(), steps: [] };

// Build DOM
const pipeline = document.getElementById('pipeline');
STEPS.forEach((s, i) => {
  if (i > 0) {
    const edge = document.createElement('div');
    edge.className = 'edge';
    edge.id = `edge-${i}`;
    edge.innerHTML = '<div class="edge-dot"></div>';
    pipeline.appendChild(edge);
  }
  const step = document.createElement('div');
  step.className = 'step';
  step.id = `step-${i}`;
  step.innerHTML = `
    <div class="step-icon">${s.icon}</div>
    <div class="step-text">
      <div class="step-label">${s.label}</div>
      <div class="step-detail">${s.action}</div>
    </div>
    <div class="step-time"></div>
  `;
  pipeline.appendChild(step);
  state.steps.push({ status: 'pending', startedAt: null, completedAt: null });
});

// Timer
setInterval(() => {
  const el = ((Date.now() - state.startTime) / 1000).toFixed(1);
  document.getElementById('timer').textContent = el + 's';
}, 100);

function addLog(step, status, detail) {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = `log-${status}`;
  const t = ((Date.now() - state.startTime) / 1000).toFixed(1);
  const label = STEPS[step]?.label ?? '?';
  div.textContent = `[${t}s] ${label}: ${detail || status}`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

window.flowUpdate = function(stepIndex, status, detail) {
  const s = state.steps[stepIndex];
  if (!s) return;

  const el = document.getElementById(`step-${stepIndex}`);
  const edge = document.getElementById(`edge-${stepIndex}`);

  if (status === 'active') {
    s.status = 'active';
    s.startedAt = Date.now();
    el.className = 'step active';
    if (edge) { edge.className = 'edge active'; }
    if (detail) el.querySelector('.step-detail').textContent = detail;
  } else if (status === 'complete') {
    s.status = 'complete';
    s.completedAt = Date.now();
    el.className = 'step complete';
    el.querySelector('.step-icon').textContent = '✓';
    if (edge) { edge.className = 'edge complete'; }
    if (detail) el.querySelector('.step-detail').textContent = detail;
    if (s.startedAt) {
      const dur = ((s.completedAt - s.startedAt) / 1000).toFixed(1);
      el.querySelector('.step-time').textContent = dur + 's';
    }
    // Update progress
    const completed = state.steps.filter(x => x.status === 'complete').length;
    document.getElementById('progress-fill').style.width = (completed / STEPS.length * 100) + '%';

    // Show banner on final step
    if (stepIndex === STEPS.length - 1) {
      const total = ((Date.now() - state.startTime) / 1000).toFixed(1);
      const banner = document.getElementById('banner');
      banner.querySelector('h2').textContent = '✓ E2E Complete';
      banner.querySelector('p').textContent = `Total: ${total}s — Bounty released`;
      banner.style.display = 'block';
      setTimeout(() => { banner.style.display = 'none'; }, 5000);
    }
  } else if (status === 'error') {
    s.status = 'error';
    el.className = 'step error';
    if (detail) el.querySelector('.step-detail').textContent = detail;
  }

  addLog(stepIndex, status, detail || '');
};

// Expose start time setter for sync with E2E script
window.flowSetStart = function(ts) { state.startTime = ts; };
</script>
</body>
</html>
