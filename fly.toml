app = "anchr"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[deploy]
  wait_timeout = "10m"

[env]
  REFERENCE_APP_PORT = "8080"
  RUNTIME_DATA_DIR = "/data"
  NOSTR_RELAYS = "wss://anchr-relay.fly.dev"
  BLOSSOM_SERVERS = "https://anchr-blossom.fly.dev"

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
