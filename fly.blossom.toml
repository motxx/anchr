app = "anchr-blossom"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile.blossom"

[deploy]
  wait_timeout = "5m"

[[mounts]]
  source = "blossom_data"
  destination = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
