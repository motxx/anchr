app = "anchr-relay"
primary_region = "nrt"

[build]
  image = "scsibug/nostr-rs-relay:latest"

[deploy]
  wait_timeout = "5m"

[[mounts]]
  source = "relay_data"
  destination = "/usr/src/app/db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
