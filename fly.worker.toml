app = "anchr-tlsn-worker"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  ANCHR_SERVER_URL = "https://anchr-app.fly.dev"
  TLSN_VERIFIER_HOST = "anchr-tlsn-verifier.fly.dev:7046"
  TLSN_PROVER_BIN = "/usr/local/bin/tlsn-prove"

[processes]
  worker = "bun run packages/sdk/src/cli.ts"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
